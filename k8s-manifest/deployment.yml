apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopeasy-deploy
  namespace: shopeasy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopeasy
  template:
    metadata:
      labels:
        app: shopeasy
    spec:
      containers:
        - name: cont1
          image: venkatanagababuallu/shopeasy:v1.5
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000

            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
 
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
 
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3


