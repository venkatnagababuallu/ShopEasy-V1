{% extends "base.html" %}

{% block content %}

<div class="form-page">

    <div class="product-form-card">

        <h1>
            ✏️ Edit Product
        </h1>

        <p class="form-subtitle">
            Update product information
        </p>

        <form method="POST">

            <div class="form-group">

                <label>
                    Product Name
                </label>

                <input
                    type="text"
                    name="name"
                    value="{{ product.name }}"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Description
                </label>

                <textarea
                    name="description"
                    rows="4"
                    required
                >{{ product.description }}</textarea>

            </div>

            <div class="form-row">

                <div class="form-group">

                    <label>
                        Price (₹)
                    </label>

                    <input
                        type="number"
                        name="price"
                        value="{{ product.price }}"
                        required
                    >

                </div>

                <div class="form-group">

                    <label>
                        Stock
                    </label>

                    <input
                        type="number"
                        name="stock"
                        value="{{ product.stock }}"
                        required
                    >

                </div>

            </div>

            <div class="form-group">

                <label>
                    Image URL
                </label>

                <input
                    type="text"
                    name="image"
                    value="{{ product.image }}"
                >

            </div>

            <button
                type="submit"
                class="btn save-btn">

                💾 Update Product

            </button>

            <a href="/admin"
               class="btn secondary-btn">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
