{% extends "base.html" %}

{% block content %}

<h2>Order History</h2>

{% if orders %}

<table>

    <tr>
        <th>Order ID</th>
        <th>Total Amount</th>
        <th>Date</th>
    </tr>

    {% for order in orders %}

    <tr>

        <td>{{ order.id }}</td>

        <td>₹ {{ order.total_amount }}</td>

        <td>{{ order.order_date }}</td>

    </tr>

    {% endfor %}

</table>

{% else %}

<p>No orders found.</p>

{% endif %}

{% endblock %}
