{% extends "base.html" %}

{% block content %}

<h2>Add Product</h2>

<form method="POST">

    <input type="text"
           name="name"
           placeholder="Product Name"
           required>

    <br><br>

    <input type="text"
           name="description"
           placeholder="Description"
           required>

    <br><br>

    <input type="number"
           name="price"
           placeholder="Price"
           required>

    <br><br>

    <input type="number"
           name="stock"
           placeholder="Stock"
           required>

    <br><br>

    <input type="text"
           name="image"
           placeholder="Image URL">

    <br><br>

    <button type="submit">
        Add Product
    </button>

</form>

{% endblock %}
