{% extends "base.html" %}

{% block content %}

<div class="product">

    <img src="{{ product.image }}"
         alt="{{ product.name }}">

    <h2>{{ product.name }}</h2>

    <p>{{ product.description }}</p>

    <h3>₹ {{ product.price }}</h3>

    <p>
        Stock Available:
        {{ product.stock }}
    </p>

    <a href="/add-to-cart/{{ product.id }}">
        Add to Cart
    </a>

</div>

{% endblock %}
